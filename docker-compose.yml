version: "3.9"

services:

  # ── MQTT Broker ─────────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: fleet-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./deployments/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fleet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleet_user
      POSTGRES_PASSWORD: fleet_password
      POSTGRES_DB: fleet_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_user -d fleet_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: fleet-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Fleet Service (Golang backend) ───────────────────────────────────────────
  fleet-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fleet-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mosquitto:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # Override config.yml values via env vars (viper AutomaticEnv)
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: fleet_user
      DATABASE_PASSWORD: fleet_password
      DATABASE_NAME: fleet_db
      MQTT_BROKER: "tcp://mosquitto:1883"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672/"

  # ── Feeder (mock data publisher) ─────────────────────────────────────────────
  fleet-feeder:
    build:
      context: .
      dockerfile: Dockerfile.feeder
    container_name: fleet-feeder
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
      fleet-service:
        condition: service_started

volumes:
  postgres-data:
  rabbitmq-data:
  mosquitto-data:
  mosquitto-log:
